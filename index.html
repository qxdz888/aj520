<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOES GALLERY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0 20px;
    }

    .nav-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-btn {
      padding: 8px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: transparent;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-btn:hover {
      border-color: rgba(255, 255, 255, 0.5);
      color: #fff;
    }

    .nav-btn.active {
      background: #fff;
      color: #0a0a0a;
      border-color: #fff;
    }

    /* Banner */
    .banner {
      margin-top: 70px;
      height: 500px;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1920') center/cover;
      opacity: 0.3;
    }

    .banner-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }

    .banner-title {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .banner-subtitle {
      font-size: 18px;
      color: #888;
      letter-spacing: 2px;
    }

    /* 分类标签 */
    .section-header {
      max-width: 1400px;
      margin: 60px auto 30px;
      padding: 0 20px;
    }

    .section-title {
      font-size: 14px;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* 图片网格 */
    .gallery {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 20px;
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
      line-height: 1.4;
    }

    .card-price {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .card-category {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 11px;
      color: #888;
    }

    /* 弹窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      max-width: 90%;
      max-height: 90%;
      position: relative;
    }

    .modal-image {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 12px;
      display: block;
    }

    .modal-info {
      text-align: center;
      margin-top: 24px;
    }

    .modal-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-price {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }

    .modal-close {
      position: absolute;
      top: -50px;
      right: 0;
      background: none;
      border: none;
      color: #888;
      font-size: 32px;
      cursor: pointer;
      padding: 10px;
      transition: color 0.3s;
    }

    .modal-close:hover {
      color: #fff;
    }

    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .nav-content {
        flex-direction: column;
        height: auto;
        padding: 15px 0;
        gap: 15px;
      }

      .navbar {
        position: relative;
      }

      .banner {
        margin-top: 0;
        height: 350px;
      }

      .banner-title {
        font-size: 28px;
      }

      .banner-subtitle {
        font-size: 14px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
      }

      .card-info {
        padding: 14px;
      }

      .card-name {
        font-size: 13px;
      }

      .card-price {
        font-size: 16px;
      }

      .section-header {
        margin-top: 30px;
      }
    }

    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .banner-title {
        font-size: 22px;
      }

      .nav-btn {
        padding: 6px 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-content">
      <div class="logo">SHOES GALLERY</div>
      <div class="nav-links">
        <button class="nav-btn active" data-category="all">全部</button>
        <button class="nav-btn" data-category="Air Jordan">Air Jordan</button>
        <button class="nav-btn" data-category="Air Force 1">Air Force 1</button>
        <button class="nav-btn" data-category="Dunk">Dunk</button>
        <button class="nav-btn" data-category="Air Max">Air Max</button>
        <button class="nav-btn" data-category="Blazer">Blazer</button>
      </div>
    </div>
  </nav>

  <!-- Banner -->
  <section class="banner">
    <div class="banner-content">
      <h1 class="banner-title">潮流鞋款展示</h1>
      <p class="banner-subtitle">精选 Nike & Air Jordan 系列</p>
    </div>
  </section>

  <!-- 分类标题 -->
  <div class="section-header">
    <p class="section-title">全部鞋款</p>
  </div>

  <!-- 图片展示区 -->
  <section class="gallery" id="gallery"></section>

  <!-- 弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <img class="modal-image" id="modalImage" src="" alt="">
      <div class="modal-info">
        <h2 class="modal-name" id="modalName"></h2>
        <p class="modal-price" id="modalPrice"></p>
      </div>
    </div>
  </div>

  <script>
    // 鞋子数据
    const shoes = [
      {
        id: 1,
        name: "Air Jordan 1 Retro High OG Chicago",
        category: "Air Jordan",
        price: "¥1399",
        image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"
      },
      {
        id: 2,
        name: "Air Jordan 1 High Travis Scott",
        category: "Air Jordan",
        price: "¥1899",
        image: "https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=600"
      },
      {
        id: 3,
        name: "Air Jordan 4 Retro Black Cat",
        category: "Air Jordan",
        price: "¥1599",
        image: "https://images.unsplash.com/photo-1539185441755-769473a23570?w=600"
      },
      {
        id: 4,
        name: "Air Force 1 Low White",
        category: "Air Force 1",
        price: "¥799",
        image: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=600"
      },
      {
        id: 5,
        name: "Air Force 1 '07 Triple Black",
        category: "Air Force 1",
        price: "¥899",
        image: "https://images.unsplash.com/photo-1551107696-a4b0c5a0d9a2?w=600"
      },
      {
        id: 6,
        name: "Nike Dunk Low Panda",
        category: "Dunk",
        price: "¥999",
        image: "https://images.unsplash.com/photo-1460353581641-37baddab0fa2?w=600"
      },
      {
        id: 7,
        name: "Nike Dunk High Syracuse",
        category: "Dunk",
        price: "¥1099",
        image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=600"
      },
      {
        id: 8,
        name: "Air Max 90 Infrared",
        category: "Air Max",
        price: "¥1199",
        image: "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=600"
      },
      {
        id: 9,
        name: "Air Max 97 Silver Bullet",
        category: "Air Max",
        price: "¥1399",
        image: "https://images.unsplash.com/photo-1606890658317-7d14490b76fd?w=600"
      },
      {
        id: 10,
        name: "Nike Blazer Mid '77 Vintage",
        category: "Blazer",
        price: "¥699",
        image: "https://images.unsplash.com/photo-1515955656352-a1fa3ffcd111?w=600"
      },
      {
        id: 11,
        name: "Nike Blazer Low White",
        category: "Blazer",
        price: "¥599",
        image: "https://images.unsplash.com/photo-1584735175315-9d5df23860e6?w=600"
      }
    ];

    // 当前分类
    let currentCategory = 'all';

    // DOM 元素
    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('modal');
    const modalImage = document.getElementById('modalImage');
    const modalName = document.getElementById('modalName');
    const modalPrice = document.getElementById('modalPrice');
    const modalClose = document.getElementById('modalClose');
    const navBtns = document.querySelectorAll('.nav-btn');
    const sectionTitle = document.querySelector('.section-title');

    // 渲染图片
    function renderGallery(category) {
      const filtered = category === 'all' 
        ? shoes 
        : shoes.filter(shoe => shoe.category === category);

      if (filtered.length === 0) {
        gallery.innerHTML = '<div class="empty-state">暂无该分类的鞋款</div>';
        return;
      }

      gallery.innerHTML = filtered.map(shoe => `
        <div class="card" data-id="${shoe.id}">
          <img class="card-image" src="${shoe.image}" alt="${shoe.name}" loading="lazy">
          <div class="card-info">
            <h3 class="card-name">${shoe.name}</h3>
            <p class="card-price">${shoe.price}</p>
            <span class="card-category">${shoe.category}</span>
          </div>
        </div>
      `).join('');

      // 绑定点击事件
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.dataset.id);
          openModal(id);
        });
      });
    }

    // 打开弹窗
    function openModal(id) {
      const shoe = shoes.find(s => s.id === id);
      if (!shoe) return;

      modalImage.src = shoe.image.replace('w=600', 'w=1200');
      modalName.textContent = shoe.name;
      modalPrice.textContent = shoe.price;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // 关闭弹窗
    function closeModal() {
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }

    // 切换分类
    function switchCategory(category) {
      currentCategory = category;
      
      // 更新导航按钮状态
      navBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === category);
      });

      // 更新标题
      sectionTitle.textContent = category === 'all' ? '全部鞋款' : category;

      // 渲染图片
      renderGallery(category);
    }

    // 事件监听
    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        switchCategory(btn.dataset.category);
      });
    });

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // 初始化
    renderGallery('all');
  </script>
</body>
</html>
